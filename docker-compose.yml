services:
    postgres_db:
        image: postgres:18
        container_name: postgres_db
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
            # - ./backend/db_scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
    postgres_data:
